name: EasyGig CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: 
          - api-gateway
          - discovery-server
          - profile-service
          - booking-service
          - chat-service
          - notification-service

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven (${{ matrix.service }})
      working-directory: ./${{ matrix.service }}
      run: mvn clean package

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./easygig-frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./easygig-frontend
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./easygig-frontend
      run: npm run build
