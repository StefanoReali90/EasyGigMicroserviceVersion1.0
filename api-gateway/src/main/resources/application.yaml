server:
  port: 8080 # La porta a cui punterà il frontend

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # --- PROFILE SERVICE ---
        # Rotta pubblica: registrazione utenti (nessun token richiesto)
        - id: profile-service-users
          uri: lb://profile-service
          predicates:
            - Path=/users/**
          filters:
            - AuthenticationFilter

        # Rotta protetta: gestione venues
        - id: profile-service-venues
          uri: lb://profile-service
          predicates:
            - Path=/venues/**
          filters:
            - AuthenticationFilter

        # Rotta protetta: gestione bands
        - id: profile-service-bands
          uri: lb://profile-service
          predicates:
            - Path=/bands/**
          filters:
            - AuthenticationFilter

        # --- BOOKING SERVICE ---
        # Rotta protetta: prenotazioni (richiede token)
        - id: booking-service-bookings
          uri: lb://booking-service
          predicates:
            - Path=/bookings/**
          filters:
            - AuthenticationFilter

        # Rotta protetta: gestione slot e calendario
        - id: booking-service-slots
          uri: lb://booking-service
          predicates:
            - Path=/slots/**
          filters:
            - AuthenticationFilter

eureka:
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# Chiave segreta JWT: DEVE essere identica a quella del profile-service!
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}