server:
  port: 8081

spring:
  application:
    name: profile-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://postgres:5432/easygig-profiles
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: profile-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.spring.*"
        spring.json.use.type.headers: "true"
        spring.json.type.mapping: "org.spring.bookingservice.dto.BookingCanceledEvent:org.spring.profileservice.dto.BookingCanceledEvent,org.spring.bookingservice.dto.ReviewCreatedEvent:org.spring.profileservice.dto.ReviewCreatedEvent,org.spring.bookingservice.dto.BookingExpiredEvent:org.spring.profileservice.dto.BookingExpiredEvent"

logging:
  file:
    name: logs/profile-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    prefer-ip-address: true

application:
  frontend:
    url: http://localhost:3000/register
  invitation:
    expiry-days: 7
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:4AwcRJEcJ4pU9iPtoQ7mUDRB+Suf0vNYP0h6uXX4ejo=}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: org.spring.profileservice.controller
