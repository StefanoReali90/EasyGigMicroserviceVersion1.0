server:
  port: 8081

spring:
  application:
    name: profile-service
  datasource:
      url: jdbc:postgresql://localhost:5432/easygig-profiles
      username: ${DB_USERNAME:postgres}
      password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
